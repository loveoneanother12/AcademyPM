<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f12" id="meta-theme-color" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark'
      document.documentElement.setAttribute('data-theme', t)
      document.getElementById('meta-theme-color').content = t === 'light' ? '#f0ebe0' : '#111113'
    })()
  </script>
  <title>AcademyPM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- 헤더 -->
    <header id="app-header">
      <div class="header-inner">
        <div class="header-logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">AcademyPM</span>
        </div>
        <div id="header-actions">
          <div class="theme-toggle-wrap" id="theme-toggle-wrap" title="테마 전환">
            <div class="theme-toggle-pill" id="theme-toggle-btn">
              <div class="theme-toggle-knob"></div>
            </div>
            <span class="theme-toggle-label" id="theme-toggle-label">Dark</span>
          </div>
        </div>
      </div>
    </header>

    <!-- 페이지 컨텐츠 -->
    <main id="page-content">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <p>불러오는 중...</p>
      </div>
    </main>

    <!-- 하단 탭 네비게이션 -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-tab="students">
        <span class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="nav-label">학생</span>
      </button>
      <button class="nav-item" data-tab="classes">
        <span class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
        </span>
        <span class="nav-label">수업</span>
      </button>
      <button class="nav-item" data-tab="attendance">
        <span class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <path d="M9 16l2 2 4-4"/>
          </svg>
        </span>
        <span class="nav-label">출석</span>
      </button>
      <button class="nav-item" data-tab="results">
        <span class="nav-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </span>
        <span class="nav-label">결과</span>
      </button>
    </nav>
  </div>

  <!-- 토스트 컨테이너 -->
  <div id="toast-container"></div>

  <!-- 모달 오버레이 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-sheet" class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <!-- 캘린더 팝업 -->
  <div id="calendar-popup" class="calendar-popup hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
