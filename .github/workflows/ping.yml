name: Supabase Keep-Alive Ping

# Supabase 무료 플랜은 7일 비활성 시 프로젝트 정지
# 6일마다 ping하여 정지 방지

on:
  schedule:
    - cron: '0 0 */6 * *'   # 6일마다 자정 실행
  workflow_dispatch:         # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -f "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/students?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -o /dev/null -s -w "HTTP Status: %{http_code}\n"
          echo "Supabase ping completed at $(date)"
